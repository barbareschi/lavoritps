<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Carica CSV</title>
</head>

<body>

<h2>Carica file CSV</h2>

<input type="file" id="fileInput" accept=".csv">
<button onclick="apriTabella()">Mostra tabella</button>

<script>

let dati = [];

document.getElementById("fileInput").addEventListener("change", function () {

    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const testo = e.target.result;
        dati = parseCSV(testo);

        localStorage.setItem("csvData", JSON.stringify(dati));

    };

    reader.readAsText(file);

});

function parseCSV(testo){

    const righe = testo.trim().split("\n");
    let risultato = [];

    for(let i=0;i<righe.length;i++){
        risultato.push(righe[i].split(","));
    }

    return risultato;
}

function apriTabella(){

    window.open("destinatario.html");

}

</script>

</body>
</html>
