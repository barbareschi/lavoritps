<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tabella CSV</title>

<style>
table{
    border-collapse: collapse;
    width:100%;
}

td{
    border:1px solid black;
    padding:6px;
}
</style>

</head>

<body>

<h2>Tabella CSV</h2>

<table id="tabella"></table>

<script>
const dati = JSON.parse(localStorage.getItem("csvData"));
const tabella = document.getElementById("tabella");

if(dati){
    for(let i=0;i<dati.length;i++){
        let tr = document.createElement("tr");
        for(let j=0;j<dati[i].length;j++){
            let td = document.createElement("td");
            td.textContent = dati[i][j];
            tr.appendChild(td);
        }
        tabella.appendChild(tr);
    }
} else {
    tabella.innerHTML = "<tr><td>Nessun dato CSV trovato</td></tr>";
}
</script>

</body>
</html>
